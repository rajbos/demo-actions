name: Test GitHub Models API

on:
  workflow_dispatch:

  push:
    paths: .github/workflows/github-models.yml


jobs:
  call-models:
    runs-on: ubuntu-slim
    permissions: 
      models: read
    steps:
      - name: List available models
        shell: bash
        run: |
          echo "Available models:"
          curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "https://models.github.ai/catalog/models" | jq '[.[] | .id]'

      - name: Call GitHub Models API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          HTTP_CODE=$(curl -s -w "%{http_code}" -o test-response.json \
              -X POST "https://models.github.ai/inference/chat/completions" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Content-Type: application/json" \
              -d '{"model":"openai/gpt-4.1","messages":[{"role":"user","content":"What is the capital of France?"}]}')
          echo "HTTP Status: $HTTP_CODE"
          echo "Response body:"
          cat test-response.json
